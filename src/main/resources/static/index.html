<!DOCTYPE html>
<html>
<head>
    <title>Healthcare EMR Dashboard</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #2c7be5;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 30px;
        }

        .card {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
        }

        h2 {
            color: #2c7be5;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>Healthcare EMR Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Patient Information</h2>
        <p>Name: Ravi Kumar</p>
        <p>Age: 32</p>
        <p>Blood Group: O+</p>
    </div>

    <div class="card">
        <h2>Allergy Information</h2>
        <p>Penicillin Allergy</p>
    </div>

    <div class="card">
        <h2>Clinical Reports</h2>
        <p>Blood Test Completed Successfully</p>
    </div>

    <div class="card">
        <h2>Doctor Notes</h2>
        <p>Patient recovering well and vitals are stable.</p>
    </div>

</div>

</body>
</html>
